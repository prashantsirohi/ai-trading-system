<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1020" viewBox="0 0 1800 1020">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .group { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px Arial, sans-serif; fill: #334155; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1020" fill="#f8fafc" />
  <text x="40" y="50" class="title">AI Trading System: Operational Data Flow (Graphical)</text>

  <rect x="40" y="90" width="300" height="430" fill="#eef2ff" stroke="#6366f1" class="box" />
  <text x="60" y="120" class="group">Data Providers</text>
  <rect x="65" y="145" width="250" height="70" fill="#ffffff" stroke="#6366f1" class="box" />
  <text x="85" y="185" class="label">NSE Bhavcopy</text>
  <rect x="65" y="235" width="250" height="70" fill="#ffffff" stroke="#6366f1" class="box" />
  <text x="85" y="275" class="label">yfinance Fallback</text>
  <rect x="65" y="325" width="250" height="70" fill="#ffffff" stroke="#6366f1" class="box" />
  <text x="85" y="365" class="label">NSE Delivery (MTO/Securitywise)</text>
  <rect x="65" y="415" width="250" height="70" fill="#ffffff" stroke="#6366f1" class="box" />
  <text x="85" y="455" class="label">Dhan API (Optional Paths)</text>

  <rect x="380" y="90" width="980" height="300" fill="#ecfeff" stroke="#0891b2" class="box" />
  <text x="400" y="120" class="group">Pipeline Stages</text>

  <rect x="410" y="170" width="160" height="90" fill="#ffffff" stroke="#0891b2" class="box" />
  <text x="455" y="207" class="label">Ingest</text>
  <text x="430" y="228" class="small">missing-range + trust tags</text>
  <text x="430" y="246" class="small">bhavcopy validate gate</text>

  <rect x="610" y="170" width="160" height="90" fill="#ffffff" stroke="#0891b2" class="box" />
  <text x="650" y="207" class="label">Features</text>
  <text x="628" y="228" class="small">technical indicators</text>
  <text x="630" y="246" class="small">sector RS artifacts</text>

  <rect x="810" y="170" width="160" height="90" fill="#ffffff" stroke="#0891b2" class="box" />
  <text x="865" y="207" class="label">Rank</text>
  <text x="825" y="228" class="small">ranked + breakout + payload</text>

  <rect x="1010" y="170" width="160" height="90" fill="#ffffff" stroke="#0891b2" class="box" />
  <text x="1052" y="207" class="label">Execute</text>
  <text x="1028" y="228" class="small">policy -> orders/fills</text>

  <rect x="1210" y="170" width="160" height="90" fill="#ffffff" stroke="#0891b2" class="box" />
  <text x="1260" y="207" class="label">Publish</text>
  <text x="1228" y="228" class="small">Telegram/Sheets/QuantStats</text>

  <line x1="570" y1="215" x2="610" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="770" y1="215" x2="810" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="970" y1="215" x2="1010" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="1170" y1="215" x2="1210" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)" />

  <rect x="380" y="430" width="980" height="270" fill="#f0fdf4" stroke="#16a34a" class="box" />
  <text x="400" y="460" class="group">Operational Stores</text>

  <rect x="410" y="490" width="300" height="80" fill="#ffffff" stroke="#16a34a" class="box" />
  <text x="430" y="525" class="label">data/ohlcv.duckdb</text>
  <text x="430" y="546" class="small">_catalog, provenance, quarantine, delivery</text>

  <rect x="750" y="490" width="300" height="80" fill="#ffffff" stroke="#16a34a" class="box" />
  <text x="770" y="525" class="label">data/control_plane.duckdb</text>
  <text x="770" y="546" class="small">run/stage/artifact, dq, alerts, publish log</text>

  <rect x="1090" y="490" width="240" height="80" fill="#ffffff" stroke="#16a34a" class="box" />
  <text x="1110" y="525" class="label">data/execution.duckdb</text>
  <text x="1110" y="546" class="small">orders, fills, positions</text>

  <rect x="410" y="595" width="920" height="80" fill="#ffffff" stroke="#16a34a" class="box" />
  <text x="430" y="630" class="label">data/pipeline_runs/&lt;run_id&gt;/&lt;stage&gt;/attempt_&lt;n&gt;</text>
  <text x="430" y="651" class="small">csv/json artifacts used by execute, publish, UI and recovery retries</text>

  <line x1="490" y1="260" x2="490" y2="490" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="690" y1="260" x2="890" y2="490" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="890" y1="260" x2="870" y2="595" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1090" y1="260" x2="1210" y2="490" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1290" y1="260" x2="910" y2="595" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="1400" y="90" width="360" height="610" fill="#fff7ed" stroke="#f97316" class="box" />
  <text x="1420" y="120" class="group">Outputs / Consumers</text>

  <rect x="1425" y="145" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="181" class="label">Telegram</text>
  <rect x="1425" y="220" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="256" class="label">Google Sheets</text>
  <rect x="1425" y="295" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="331" class="label">QuantStats Tearsheet</text>
  <rect x="1425" y="370" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="406" class="label">Dashboard Payload</text>
  <rect x="1425" y="445" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="481" class="label">Research UI (Streamlit)</text>
  <rect x="1425" y="520" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="556" class="label">Execution UI (NiceGUI)</text>
  <rect x="1425" y="595" width="310" height="62" fill="#ffffff" stroke="#f97316" class="box" />
  <text x="1445" y="631" class="label">Operator Commands / Retry Flow</text>

  <line x1="1370" y1="215" x2="1425" y2="176" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1370" y1="215" x2="1425" y2="251" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1370" y1="215" x2="1425" y2="326" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1370" y1="215" x2="1425" y2="401" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="1050" y1="530" x2="1425" y2="476" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1210" y1="530" x2="1425" y2="551" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="980" y1="635" x2="1425" y2="626" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="315" y1="180" x2="410" y2="188" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="315" y1="270" x2="410" y2="205" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="315" y1="360" x2="410" y2="222" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="315" y1="450" x2="410" y2="240" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />

  <text x="40" y="990" class="small">Legend: Blue = providers, Cyan = pipeline, Green = data stores, Orange = outputs/UI.</text>
</svg>
