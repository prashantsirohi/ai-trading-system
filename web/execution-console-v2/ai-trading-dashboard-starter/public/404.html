<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Quantis Operator Console</title>
    <script>
      // GitHub Pages SPA redirect: re-encode the path into the query string
      // so index.html can recover it and push the correct history entry.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
