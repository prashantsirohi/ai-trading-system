name: stage1_watchlist

entry:
  # Discovery screen:
  # Close > SMA50, Close > EMA20, SMA50 > SMA200 or rising for 20 sessions.
  require_stage_2: false
  require_price_above_sma200: false
  require_price_above_sma50: true
  require_price_above_ema20: true
  require_sma50_above_sma200_or_rising_20d: true
  require_sector_positive: true
  min_volume_ratio: 1.5
  require_delivery_above_sector_median: false
  min_close_to_52w_high: 0.75
  min_return_20_pct: 8.0
  min_return_50_pct: 15.0
  max_drawdown_from_recent_high_pct: 25.0
  max_below_ema20_days_20: 6

stop:
  method: hybrid
  atr_multiple: 2.0
  stop_pct: 0.08
  hybrid_atr_multiple: 2.5

exit:
  emergency_exit_below_sma200: true
  dma_exit_window: 20
  dma_whipsaw_buffer_pct: 0.5
  exit_on_rank_deterioration: true
  max_hold_rank: 80
  rank_deterioration_bars: 3
  exit_on_score_deterioration: true
  min_hold_score: 55.0
  score_deterioration_bars: 3
  time_stop_days: 60

sizing:
  method: equal_weight
  risk_per_trade_pct: 1.0
  max_position_pct: 12.0

constraints:
  max_concurrent_positions: 8
  max_stock_weight_pct: 12.0
  max_sector_exposure_pct: 30.0
