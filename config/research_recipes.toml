[recipes.breakout_5d]
description = "Short swing breakout recipe focused on 5-day follow-through validation."
engine = "lightgbm"
horizon = 5
from_date = "2018-01-01"
to_date = "2025-12-31"
dataset_name = "breakout_sector_h5"
model_name = "breakout_sector_alpha"
model_version = "h5_v1"
validation_fraction = 0.20
progress_interval = 25
min_train_years = 5
shadow_environment = "operational_shadow_5d"
auto_approve = false
auto_deploy = false

[recipes.breakout_5d.validation]
min_validation_auc = 0.55
min_walkforward_auc = 0.55
min_precision_at_10pct = 0.35

[recipes.breakout_20d]
