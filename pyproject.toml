[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-trading-system"
version = "0.1.0"
description = "Technical NSE trading pipeline with staged orchestration, DQ, and dashboarding."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "duckdb==1.1.3",
  "fastapi==0.115.8",
  "numpy==1.26.4",
  "pandas==2.2.3",
  "plotly",
  "pyarrow",
  "pydantic",
  "python-dotenv",
  "quantstats==0.0.64",
  "requests",
  "uvicorn==0.34.0",
]

[project.optional-dependencies]
dev = [
  "black",
  "mypy",
  "pytest",
  "pytest-cov",
  "ruff",
]

[project.scripts]
ai-trading-pipeline = "run.orchestrator:main"
ai-trading-publish-test = "run.publish_test:main"
ai-trading-daily = "run.daily_pipeline:main"
ai-trading-execution-ui = "ui.execution.app:main"
ai-trading-execution-api = "ui.execution_api.app:main"
ai-trading-research-recipe = "research.run_recipe:main"

[tool.setuptools.packages.find]
where = [".", "src"]
include = [
  "ai_trading_system*",
  "analytics*",
  "collectors*",
  "config*",
  "core*",
  "dashboard*",
  "execution*",
  "features*",
  "publishers*",
  "research*",
  "run*",
  "ui*",
]
exclude = [
  "data*",
  "docs*",
  "logs*",
  "models*",
  "reports*",
  "sql*",
  "streamlit*",
  "test*",
]

[tool.pytest.ini_options]
pythonpath = [
  ".",
  "src",
]
testpaths = [
  "tests",
]
