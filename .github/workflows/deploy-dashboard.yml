name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/execution-console-v2/ai-trading-dashboard-starter/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/execution-console-v2/ai-trading-dashboard-starter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/execution-console-v2/ai-trading-dashboard-starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (mock API mode)
        env:
          VITE_USE_MOCK_API: 'true'
          # GitHub Pages serves from a subpath — set the base so assets resolve.
          VITE_BASE_URL: '/ai-trading-system/'
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/execution-console-v2/ai-trading-dashboard-starter/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
