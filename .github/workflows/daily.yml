name: Daily Trading System

on:
  schedule:
    # Run at 4:30 PM IST (11:00 AM UTC) Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (skip holiday/weekend)'
        required: false
        default: 'false'

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -e .
      
      - name: Configure environment
        run: |
          # Create .env file with secrets
          echo "DHAN_CLIENT_ID=${{ secrets.DHAN_CLIENT_ID }}" > .env
          echo "DHAN_API_KEY=${{ secrets.DHAN_API_KEY }}" >> .env
          echo "DHAN_PIN=${{ secrets.DHAN_PIN }}" >> .env
          echo "DHAN_TOTP=${{ secrets.DHAN_TOTP }}" >> .env
          echo "GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}" >> .env
          echo "EXECUTION_API_KEY=${{ secrets.EXECUTION_API_KEY }}" >> .env
             # Set ENV to github for light data
          echo "ENV=github" >> .env
          
          # Create Google token.json for Sheets API
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
      
      - name: Cache feature data
        id: cache-feature
        uses: actions/cache@v4
        with:
          path: data/feature_store
          key: features-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            features-${{ runner.os }}-py311-
      
      - name: Check cache restore
        run: |
          if [ -d "data/feature_store/all_symbols" ]; then
            echo "Cache restored - features exist"
          else
            echo "No cache - need to fetch data"
          fi

      - name: Verify Data Availability
        run: |
          if [ ! -d "data" ]; then
            echo "Data directory missing."
            exit 1
          fi
          if [ ! -d "data/feature_store/all_symbols" ]; then
            echo "Feature store cache missing at data/feature_store/all_symbols."
            exit 1
          fi

      - name: Download initial data if no cache
        if: steps.cache-feature.outputs.cache-hit != 'true'
        run: |
          echo "This is first run - no cached data available"
          echo "Please run locally first to create initial data"
          exit 1
      
      - name: Run stock scan
        run: |
          python -m ai_trading_system.domains.ranking.stock_scan
      
      - name: Run sector dashboard
        run: |
          python -m ai_trading_system.domains.ranking.sector_dashboard

      - name: Canary pipeline smoke (seeded)
        env:
          PYTHONHASHSEED: "42"
        run: |
          python collectors/daily_update_runner.py --symbols-only --bulk --canary-mode --canary-symbol-limit 25
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
      
      - name: Upload feature data
        uses: actions/upload-artifact@v4
        with:
          name: features
          path: data/feature_store/all_symbols/
          retention-days: 7
