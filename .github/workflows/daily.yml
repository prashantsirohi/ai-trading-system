name: Daily Trading System

on:
  schedule:
    # Run at 4:30 PM IST (11:00 AM UTC) Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (skip holiday/weekend)'
        required: false
        default: 'false'

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      
      - name: Configure environment
        run: |
          # Create .env file with secrets
          echo "DHAN_CLIENT_ID=${{ secrets.DHAN_CLIENT_ID }}" > .env
          echo "DHAN_CLIENT_SECRET=${{ secrets.DHAN_CLIENT_SECRET }}" >> .env
          echo "DHAN_TOTP_SECRET=${{ secrets.DHAN_TOTP_SECRET }}" >> .env
          echo "GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}" >> .env
          # Set ENV to github for light data
          echo "ENV=github" >> .env
          
          # Create Google token.json for Sheets API
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
      
      - name: Cache feature data
        uses: actions/cache@v4
        with:
          path: data/feature_store/
          key: features-${{ github.run_id }}
          restore-keys: features-
      
      - name: Download latest OHLCV data
        run: |
          python collectors/daily_update_runner.py --symbols-only
      
      - name: Compute features
        run: |
          echo "Skipping feature computation - using cached features"
      
      - name: Run stock scan
        run: |
          ls -laR data/feature_store/
          python -m channel.stock_scan
      
      - name: Run sector dashboard
        run: |
          python -m channel.sector_dashboard
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
      
      - name: Save feature cache
        uses: actions/cache@v4
        with:
          path: data/feature_store/
          key: features-${{ github.run_id }}
          save-always: true
