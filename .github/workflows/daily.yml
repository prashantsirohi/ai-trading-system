name: Daily Trading System

on:
  schedule:
    # Run at 4:30 PM IST (11:00 AM UTC) Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (skip holiday/weekend)'
        required: false
        default: 'false'

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      
      - name: Configure environment
        run: |
          # Create .env file with secrets
          echo "DHAN_CLIENT_ID=${{ secrets.DHAN_CLIENT_ID }}" > .env
          echo "DHAN_CLIENT_SECRET=${{ secrets.DHAN_CLIENT_SECRET }}" >> .env
          echo "DHAN_TOTP_SECRET=${{ secrets.DHAN_TOTP_SECRET }}" >> .env
          echo "GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}" >> .env
          # Set ENV to github for light data
          echo "ENV=github" >> .env
          
          # Create Google token.json for Sheets API
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
      
      - name: Download latest data artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily.yml
          name: trading-data
          path: data/
        continue-on-error: true
      
      - name: Debug - list data directory
        run: |
          find data/ -type f 2>/dev/null | head -20
      
      - name: Download latest OHLCV data
        run: |
          python collectors/daily_update_runner.py --symbols-only
      
      - name: Compute features
        run: |
          echo "Skipping feature computation - using existing features from artifact"
      
      - name: Download data for stock scan
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily.yml
          name: trading-data
          path: data/
        continue-on-error: true
      
      - name: Run stock scan
        run: |
          ls -la data/ 2>/dev/null && ls -la data/feature_store/ 2>/dev/null || echo "No data"
          python -m channel.stock_scan
      
      - name: Run sector dashboard
        run: |
          python -m channel.sector_dashboard
      
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-data
          path: |
            data/
            !data/**/*.duckdb
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
