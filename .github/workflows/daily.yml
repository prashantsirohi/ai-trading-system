name: Daily Trading System

on:
  schedule:
    # Run at 4:30 PM IST (11:00 AM UTC) Mon-Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run (skip holiday/weekend)'
        required: false
        default: 'false'

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pyarrow "duckdb>=1.0"
          python -m pip install scikit-learn xgboost
          python -m pip install streamlit plotly
          python -m pip install python-dotenv requests pyotp loguru
          python -m pip install gspread google-auth google-auth-oauthlib
          python -m pip install dhanhq
      
      - name: Configure environment
        run: |
          # Create .env file with secrets
          echo "DHAN_CLIENT_ID=${{ secrets.DHAN_CLIENT_ID }}" > .env
          echo "DHAN_CLIENT_SECRET=${{ secrets.DHAN_CLIENT_SECRET }}" >> .env
          echo "DHAN_TOTP_SECRET=${{ secrets.DHAN_TOTP_SECRET }}" >> .env
          echo "GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}" >> .env
          # Set ENV to github for light data
          echo "ENV=github" >> .env
          
          # Create Google token.json for Sheets API
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
      
      - name: Download latest data artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily.yml
          name: trading-data
          path: data/
        continue-on-error: true
      
      - name: Check if data exists
        id: data-check
        run: |
          if [ -d "data/feature_store/all_symbols" ]; then
            echo "has_data=true" >> $GITHUB_OUTPUT
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Download latest OHLCV data
        run: |
          python collectors/daily_update_runner.py --symbols-only
      
      - name: Compute features (optional - skip if data exists)
        run: |
          python -c "
          import os
          if os.path.exists('data/feature_store/all_symbols/sector_rs.parquet'):
              print('Features already exist, skipping computation')
          else:
              import subprocess
              subprocess.run(['python', 'collectors/compute_features_batch.py'])
          "
      
      - name: Run stock scan
        if: steps.data-check.outputs.has_data == 'true'
        run: |
          python -m channel.stock_scan
      
      - name: Run sector dashboard
        if: steps.data-check.outputs.has_data == 'true'
        run: |
          python -m channel.sector_dashboard
      
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-data
          path: data/
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
